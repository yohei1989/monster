<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POCKET CREATURE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DEVICE SHELL -->
<div class="device" id="device">

  <!-- TOP SPEAKER GRILLE -->
  <div class="speaker-grille top-speaker">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- BRAND LABEL -->
  <div class="brand-bar">
    <span class="brand-logo">POCKET CREATURE</span>
    <span class="brand-model">ver.2026</span>
  </div>

  <!-- SCREEN BEZEL -->
  <div class="screen-bezel">
    <div class="screen-inner">
      <!-- LCD SCREEN -->
      <div class="lcd-screen" id="lcd">

        <!-- TIME BAR -->
        <div class="time-bar">
          <span id="time-display">00:00</span>
          <span id="day-period">☀</span>
        </div>

        <!-- CREATURE STAGE -->
        <div class="creature-stage" id="creature-stage">
          <canvas id="creature-canvas" width="120" height="96"></canvas>
          <!-- STATUS ICONS (floating) -->
          <div class="status-icons" id="status-icons"></div>
          <!-- SPEECH BUBBLE -->
          <div class="speech-bubble" id="speech-bubble" style="display:none">
            <span id="speech-text"></span>
          </div>
          <!-- EVOLUTION AURA -->
          <div class="evo-aura" id="evo-aura" style="display:none"></div>
        </div>

        <!-- ACTION RESULT -->
        <div class="action-result" id="action-result" style="display:none"></div>

        <!-- BOTTOM INFO ROW -->
        <div class="info-row">
          <span class="creature-name" id="creature-name">???</span>
          <span class="creature-type" id="creature-type"></span>
          <span class="creature-age" id="creature-age">day 0</span>
        </div>

      </div><!-- /lcd-screen -->
    </div><!-- /screen-inner -->
  </div><!-- /screen-bezel -->

  <!-- SCREEN LABEL STRIP -->
  <div class="screen-label">
    <div class="pixel-dots">
      <span></span><span></span><span></span>
    </div>
    <span class="sl-text">LIQUID CRYSTAL</span>
    <div class="pixel-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- DPAD + MAIN BUTTONS -->
  <div class="controls-area">

    <!-- D-PAD LEFT -->
    <div class="dpad">
      <div class="dpad-row">
        <div class="dpad-btn dpad-up" id="btn-gohan" title="ごはん">
          <span class="dpad-icon">🍚</span>
          <span class="dpad-label">ごはん</span>
        </div>
      </div>
      <div class="dpad-row dpad-mid">
        <div class="dpad-btn dpad-left" id="btn-souji" title="そうじ">
          <span class="dpad-icon">✨</span>
          <span class="dpad-label">そうじ</span>
        </div>
        <div class="dpad-center"></div>
        <div class="dpad-btn dpad-right" id="btn-tokkun" title="とっくん">
          <span class="dpad-icon">⚡</span>
          <span class="dpad-label">とっくん</span>
        </div>
      </div>
      <div class="dpad-row">
        <div class="dpad-btn dpad-down" id="btn-battle" title="バトル">
          <span class="dpad-icon">⚔</span>
          <span class="dpad-label">バトル</span>
        </div>
      </div>
    </div>

    <!-- CENTER LOGO -->
    <div class="center-logo">
      <div class="center-circle">
        <span>PC</span>
      </div>
    </div>

    <!-- RIGHT BUTTONS -->
    <div class="right-buttons">
      <button class="action-btn btn-a" id="btn-zukan">
        <span class="btn-label">図鑑</span>
        <span class="btn-letter">A</span>
      </button>
      <button class="action-btn btn-b" id="btn-share">
        <span class="btn-label">シェア</span>
        <span class="btn-letter">B</span>
      </button>
    </div>

  </div><!-- /controls-area -->

  <!-- USE COUNTS -->
  <div class="use-counts">
    <div class="use-item" id="use-gohan">🍚 <span id="gohan-count">2</span>/2</div>
    <div class="use-item" id="use-tokkun">⚡ <span id="tokkun-count">2</span>/2</div>
    <div class="use-item" id="use-unchi">💩 <span id="unchi-count">0</span></div>
  </div>

  <!-- BOTTOM SPEAKER -->
  <div class="speaker-grille bottom-speaker">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- BOTTOM STRAP HOLE -->
  <div class="strap-area">
    <div class="strap-hole"></div>
  </div>

</div><!-- /device -->

<!-- MODAL OVERLAYS -->
<div class="modal-overlay" id="modal-overlay" style="display:none">

  <!-- BATTLE MODAL -->
  <div class="modal" id="modal-battle" style="display:none">
    <div class="modal-title">⚔ バトル</div>
    <div class="modal-body">
      <div class="battle-tabs">
        <button class="tab-btn active" id="tab-challenge">挑戦する</button>
        <button class="tab-btn" id="tab-history">履歴</button>
      </div>
      <div id="tab-content-challenge">
        <p class="modal-hint">相手のキャラIDを入力してバトル！</p>
        <input type="text" class="modal-input" id="battle-id-input" placeholder="例: ABC123" maxlength="8">
        <button class="modal-btn" id="do-battle-btn">バトル開始！</button>
        <div class="my-id-box">
          <span>自分のID：</span>
          <strong id="my-char-id">------</strong>
          <button class="copy-btn" id="copy-id-btn">コピー</button>
        </div>
      </div>
      <div id="tab-content-history" style="display:none">
        <div id="battle-history-list" class="battle-history"></div>
      </div>
    </div>
    <button class="modal-close" id="close-battle">✕ 閉じる</button>
  </div>

  <!-- ZUKAN MODAL -->
  <div class="modal" id="modal-zukan" style="display:none">
    <div class="modal-title">📖 図鑑</div>
    <div class="modal-body zukan-body">
      <div id="zukan-list"></div>
    </div>
    <button class="modal-close" id="close-zukan">✕ 閉じる</button>
  </div>

  <!-- BATTLE RESULT MODAL -->
  <div class="modal" id="modal-result" style="display:none">
    <div class="modal-title" id="result-title">バトル結果</div>
    <div class="modal-body">
      <div class="result-display" id="result-display"></div>
    </div>
    <button class="modal-close" id="close-result">✕ 閉じる</button>
  </div>

  <!-- SHARE MODAL -->
  <div class="modal" id="modal-share" style="display:none">
    <div class="modal-title">📣 Xでシェア</div>
    <div class="modal-body">
      <div class="share-preview" id="share-preview"></div>
      <a class="modal-btn" id="share-x-btn" href="#" target="_blank">Xでポスト</a>
      <div class="my-id-box">
        <span>キャラID：</span>
        <strong id="share-char-id">------</strong>
        <button class="copy-btn" id="copy-share-id-btn">コピー</button>
      </div>
    </div>
    <button class="modal-close" id="close-share">✕ 閉じる</button>
  </div>

</div><!-- /modal-overlay -->

<script src="game.js"></script>
</body>
</html>
